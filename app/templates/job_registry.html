{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Job Registry</h1>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newJobModal">
                    Add Job
                </button>
            </div>

            <!-- Search field -->
            <div class="mb-4">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search jobs..." id="searchInput">
                    <button class="btn btn-outline-secondary" type="button">Search</button>
                </div>
            </div>

            <!-- Job list -->
            <div class="job-list">
                <!-- Jobs will be loaded dynamically -->
                {% include "components/job_list.html" %}
            </div>
        </div>
    </div>
</div>

<!-- Modal for adding new job -->
<div class="modal fade" id="newJobModal" tabindex="-1" aria-labelledby="newJobModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="newJobModalLabel">Add New Job</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                {% include "components/job_form.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
