{% extends "base.html" %}

{% block title %}Job Registry - CareerDock{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col">
            <h1 class="display-4">Job Registry</h1>
            <p class="lead">Track and manage your job applications</p>
        </div>
        <div class="col-auto d-flex align-items-center">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addJobModal">
                <i class="bi bi-plus-lg"></i> Add New Job
            </button>
        </div>
    </div>

    <!-- Search and Filter Section -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Search jobs..." 
                       hx-post="/jobs/search"
                       hx-trigger="keyup changed delay:500ms"
                       hx-target="#jobsList">
                <button class="btn btn-outline-secondary" type="button">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </div>
        <div class="col-md-4">
            <select class="form-select" hx-get="/jobs/filter" hx-target="#jobsList">
                <option value="all">All Jobs</option>
                <option value="applied">Applied</option>
                <option value="interviewing">Interviewing</option>
                <option value="offered">Offered</option>
                <option value="rejected">Rejected</option>
            </select>
        </div>
    </div>

    <!-- Jobs List -->
    <div id="jobsList" class="row">
        <!-- Jobs will be loaded here via HTMX -->
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <h5 class="card-title">Example Job Title</h5>
                        <span class="badge bg-primary">Applied</span>
                    </div>
                    <h6 class="card-subtitle mb-2 text-muted">Company Name</h6>
                    <p class="card-text">Brief description or notes about the job application.</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted">Applied: 2025-02-19</small>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-outline-primary">Edit</button>
                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Job Modal -->
<div class="modal fade" id="addJobModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Job</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addJobForm" hx-post="/jobs/add" hx-target="#jobsList" hx-swap="beforeend">
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company</label>
                        <input type="text" class="form-control" name="company" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status" required>
                            <option value="applied">Applied</option>
                            <option value="interviewing">Interviewing</option>
                            <option value="offered">Offered</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Application Date</label>
                        <input type="date" class="form-control" name="application_date" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="submit" form="addJobForm" class="btn btn-primary">Add Job</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
