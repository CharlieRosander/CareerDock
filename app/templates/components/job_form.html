<!-- Job form component -->
<div class="card mb-4">
    <div class="card-body">
        <form hx-post="/api/v1/jobs{% if job %}/{{ job.id }}{% endif %}"
              hx-target="#job-list"
              hx-swap="innerHTML">
            
            <!-- Title -->
            <div class="mb-3">
                <label for="title" class="form-label">Job Title</label>
                <input type="text" 
                       class="form-control"
                       name="title" 
                       id="title"
                       value="{{ job.title if job else '' }}"
                       required>
            </div>
            
            <!-- Company -->
            <div class="mb-3">
                <label for="company" class="form-label">Company</label>
                <input type="text" 
                       class="form-control"
                       name="company" 
                       id="company"
                       value="{{ job.company if job else '' }}"
                       required>
            </div>
            
            <!-- Description -->
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control"
                          name="description" 
                          id="description"
                          rows="3">{{ job.description if job else '' }}</textarea>
            </div>
            
            <!-- Status -->
            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select"
                        name="status" 
                        id="status"
                        required>
                    <option value="applied" {% if job and job.status == 'applied' %}selected{% endif %}>Applied</option>
                    <option value="interviewing" {% if job and job.status == 'interviewing' %}selected{% endif %}>Interviewing</option>
                    <option value="offered" {% if job and job.status == 'offered' %}selected{% endif %}>Offered</option>
                    <option value="rejected" {% if job and job.status == 'rejected' %}selected{% endif %}>Rejected</option>
                </select>
            </div>
            
            <!-- Application Date -->
            <div class="mb-3">
                <label for="application_date" class="form-label">Application Date</label>
                <input type="date" 
                       class="form-control"
                       name="application_date" 
                       id="application_date"
                       value="{{ job.application_date.strftime('%Y-%m-%d') if job and job.application_date else '' }}"
                       required>
            </div>
            
            <!-- Form actions -->
            <div class="d-flex justify-content-end gap-2">
                <button type="button" 
                        class="btn btn-outline-secondary"
                        onclick="this.closest('.card').remove()">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    {{ 'Update' if job else 'Create' }} Job
                </button>
            </div>
            
            {% if job %}
            <input type="hidden" name="id" value="{{ job.id }}">
            {% endif %}
        </form>
    </div>
</div>
